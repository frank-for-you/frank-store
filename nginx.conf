server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs — serve /page as /page.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirect .html URLs to clean versions (301 permanent)
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # Standard error pages
    error_page 404 /404.html;
}
